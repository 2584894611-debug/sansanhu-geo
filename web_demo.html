<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>好易易GEO - AI搜索分析工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        button {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover { transform: scale(1.02); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .result {
            display: none;
            background: rgba(0,212,255,0.1);
            border-radius: 16px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid rgba(0,212,255,0.3);
        }
        
        .result.show { display: block; }
        
        .result h3 { margin-bottom: 15px; color: #00d4ff; }
        
        .ai-badge {
            display: inline-block;
            background: #00d4ff;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        pre {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.show { display: block; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .feature-icon { font-size: 2em; margin-bottom: 10px; }
        .feature-name { font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 好易易GEO</h1>
        <p class="subtitle">AI搜索优化分析工具 | 6大平台智能分析</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-name">品牌分析</div>
            </div>
            <div class="feature">
                <div class="feature-icon">⚔️</div>
                <div class="feature-name">竞品对比</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📝</div>
                <div class="feature-name">内容策略</div>
            </div>
        </div>
        
        <div class="card">
            <label>分析类型</label>
            <select id="analysisType">
                <option value="brand_analysis">🏢 品牌健康度分析</option>
                <option value="competitor_analysis">⚔️ 竞品对比分析</option>
                <option value="content_strategy">📝 内容策略生成</option>
            </select>
            
            <label>品牌/公司名称</label>
            <input type="text" id="brandName" placeholder="例如：武汉万象城">
            
            <label>行业（选填）</label>
            <input type="text" id="industry" placeholder="例如：商场、餐饮、科技">
            
            <button id="analyzeBtn" onclick="doAnalyze()">开始分析</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI正在分析中...</p>
        </div>
        
        <div class="result" id="result">
            <span class="ai-badge" id="aiBadge">DeepSeek</span>
            <h3>分析结果</h3>
            <pre id="resultContent"></pre>
        </div>
    </div>
    
    <script>
        const API_URL = '/api/analyze';
        
        async function doAnalyze() {
            const type = document.getElementById('analysisType').value;
            const brand = document.getElementById('brandName').value.trim();
            const industry = document.getElementById('industry').value.trim() || '通用';
            
            if (!brand) {
                alert('请输入品牌名称');
                return;
            }
            
            // 显示加载
            document.getElementById('loading').classList.add('show');
            document.getElementById('result').classList.remove('show');
            document.getElementById('analyzeBtn').disabled = true;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: type,
                        brand: brand,
                        industry: industry
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('aiBadge').textContent = data.ai_used;
                    document.getElementById('resultContent').textContent = 
                        JSON.stringify(data.data, null, 2);
                } else {
                    document.getElementById('resultContent').textContent = 
                        '❌ 分析失败: ' + data.error;
                }
                
                document.getElementById('result').classList.add('show');
            } catch (e) {
                // 演示模式：模拟返回结果
                document.getElementById('aiBadge').textContent = 'DeepSeek (演示)';
                document.getElementById('resultContent').textContent = 
                    JSON.stringify(getDemoResult(type, brand, industry), null, 2);
                document.getElementById('result').classList.add('show');
            }
            
            document.getElementById('loading').classList.remove('show');
            document.getElementById('analyzeBtn').disabled = false;
        }
        
        function getDemoResult(type, brand, industry) {
            const results = {
                brand_analysis: {
                    brand_name: brand,
                    industry: industry,
                    ai_mentions: Math.floor(Math.random() * 50) + 10,
                    sentiment: '正面为主',
                    key_features: ['品牌知名度高', '用户口碑良好', '内容覆盖广'],
                    geo_score: Math.floor(Math.random() * 20) + 75,
                    recommendations: [
                        '建议增加小红书内容投放',
                        '优化知乎问答板块',
                        '加强抖音SEO关键词布局'
                    ]
                },
                competitor_analysis: {
                    main_brand: brand,
                    competitive_position: '行业中上游',
                    main_competitors: ['竞品A', '竞品B', '竞品C'],
                    advantages: ['品牌背书强', '线下资源丰富'],
                    weaknesses: ['线上声量不足', '内容更新慢'],
                    opportunities: ['AI搜索红利期', '新兴平台流量洼地']
                },
                content_strategy: {
                    target_keywords: [brand + '怎么样', brand + '好不好', industry + '推荐'],
                    content_types: ['测评类', '对比类', '攻略类'],
                    platforms: ['小红书', '知乎', '抖音'],
                    sample_titles: [
                        '实测' + brand + '，没想到结果是这样的',
                        brand + ' vs 竞品，到底谁更值得去',
                        '2024' + industry + '必逛清单，第一名竟然是它'
                    ]
                }
            };
            return results[type];
        }
    </script>
</body>
</html>
