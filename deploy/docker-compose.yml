# 好易易GEO Docker Compose 编排配置
# 包含: 后端API + 前端Nginx + Redis

version: "3.8"

services:
  # ============ 后端API服务 ============
  backend:
    build:
      context: ../server
      dockerfile: ../deploy/Dockerfile
    container_name: geo-insight-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      # DeepSeek API配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_API_URL=${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # 数据库配置
      - DATABASE_PATH=/app/data/geo.db
      # Redis配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    volumes:
      # 持久化数据库文件
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - geo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============ 前端Nginx服务 ============
  frontend:
    image: nginx:alpine
    container_name: geo-insight-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # 前端静态文件
      - ../web/dist:/usr/share/nginx/html:ro
      # Nginx配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - geo-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health.html", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============ Redis缓存服务 ============
  redis:
    image: redis:7-alpine
    container_name: geo-insight-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - geo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ============ 网络配置 ============
networks:
  geo-network:
    driver: bridge

# ============ 持久化卷 ============
volumes:
  backend-data:
    driver: local
  redis-data:
    driver: local
